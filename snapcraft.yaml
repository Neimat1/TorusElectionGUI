name: torus-election-gui
title: Torus Leader Visualizer
version: "1.0.5"
summary: Visualize distributed coordination on a torus network.
description: |
  Torus Leader Visualizer is an educational Java Swing desktop application
  for simulating distributed coordination on a two-dimensional torus network.

  It runs locally, lets users configure process IDs in a grid, and shows how
  messages propagate until all processes identify the maximum-ID process as
  the leader. The application does not collect user data or connect to remote
  services.

base: core24
grade: stable
confinement: strict
license: MIT
icon: assets/icons/torus-election-gui.png

website:
  - https://neimat1.github.io/TorusElectionGUI/
source-code:
  - https://github.com/neimat1/TorusElectionGUI
issues:
  - https://github.com/neimat1/TorusElectionGUI/issues
contact:
  - neimat.soliman.ismail@gmail.com

apps:
  torus-election-gui:
    command: bin/torus-election-gui
    desktop: snap/gui/torus-election-gui.desktop
    plugs:
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - home
    environment:
      XDG_DATA_HOME: "$SNAP_USER_DATA/.local/share"

parts:
  torus-election-gui:
    plugin: nil
    source: .
    build-packages:
      - maven
      - openjdk-17-jdk-headless
    stage-packages:
      - openjdk-17-jre
    override-build: |
      export JAVA_HOME="/usr/lib/jvm/java-17-openjdk-${CRAFT_ARCH_BUILD_FOR}"
      export PATH="$JAVA_HOME/bin:$PATH"
      mvn -DskipTests package
      mkdir -p "$CRAFT_PART_INSTALL/jar" "$CRAFT_PART_INSTALL/bin" "$CRAFT_PART_INSTALL/snap/gui"
      cp "target/torus-election-gui-${CRAFT_PROJECT_VERSION}.jar" "$CRAFT_PART_INSTALL/jar/app.jar"
      cp snap/local/torus-election-gui "$CRAFT_PART_INSTALL/bin/"
      cp snap/gui/torus-election-gui.desktop "$CRAFT_PART_INSTALL/snap/gui/"
      chmod 755 "$CRAFT_PART_INSTALL/bin/torus-election-gui"
